name: Samsung BLOCK OTA Apply

on:
  workflow_dispatch:

jobs:
  apply-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Zwolnij miejsce na dysku ────────────────────────────────
      - name: Zwolnij miejsce na dysku
        run: |
          echo "Przed:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "Po:"
          df -h /

      # ── Zależności ──────────────────────────────────────────────
      - name: Zainstaluj zależności
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            lz4 brotli python3 python3-pip \
            zip unzip tar pv wget curl
          pip3 install gdown

      - name: Sprawdź dysk
        run: df -h

      # ── OTA ─────────────────────────────────────────────────────
      - name: Pobierz OTA zip z Google Drive
        run: |
          mkdir -p ota
          gdown "1YnKZ9qrNmfaEDrI10pkdkSCVevBoUxBh" -O ota/ota.zip

          SIZE=$(stat -c%s ota/ota.zip 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 1048576 ]; then
            echo "❌ OTA za mały: $SIZE"
            exit 1
          fi

      - name: Rozpakuj OTA
        run: |
          mkdir -p ota_extracted
          unzip -q ota/ota.zip -d ota_extracted
          rm ota/ota.zip

      # ── Base firmware ───────────────────────────────────────────
      - name: Pobierz AP base
        run: |
          mkdir -p base_fw
          gdown "1ugH_mcYrIwuPgUJh4qeeE4AucdzbgNHI" -O base_fw/base.zip
          unzip -q base_fw/base.zip -d base_fw/

          TAR_MD5=$(find base_fw/ -maxdepth 1 -name "*.tar.md5" | head -1)
          if [ -z "$TAR_MD5" ]; then
            echo "❌ brak tar.md5"
            exit 1
          fi

          mv "$TAR_MD5" base_fw/AP_base.tar.md5

      # ── Extract base ─────────────────────────────────────────────
      - name: Wypakuj AP tar
        run: |
          mkdir -p base_extracted
          cd base_extracted
          tail -c +33 ../base_fw/AP_base.tar.md5 | tar x

      # ── lz4 ─────────────────────────────────────────────────────
      - name: Dekompresja lz4
        run: |
          cd base_extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done

      # ── lpunpack ────────────────────────────────────────────────
      - name: Install lpunpack
        run: |
          wget -q https://github.com/whyshhnuv/lpunpack-lpmake-mirror/raw/refs/heads/Linux-debian/binary/lpunpack
          chmod +x lpunpack
          sudo mv lpunpack /usr/local/bin/

      - name: Unpack super.img
        run: |
          mkdir -p partitions
          if [ -f base_extracted/super.img ]; then
            lpunpack base_extracted/super.img partitions/
          else
            cp base_extracted/*.img partitions/ 2>/dev/null || true
          fi

      # ── OTA tools ───────────────────────────────────────────────
      - name: Pobierz block OTA tools
        run: |
          wget -q https://raw.githubusercontent.com/commaai/android_build/refs/heads/master/tools/releasetools/blockimgdiff.py
          wget -q https://raw.githubusercontent.com/commaai/android_build/refs/heads/master/tools/releasetools/rangelib.py

      # ── Patch OTA ───────────────────────────────────────────────
      - name: Apply OTA patches
        run: |
          mkdir -p output_partitions
          OTA_DIR="ota_extracted"
          FAILED=0

          for tlist in "$OTA_DIR"/*.transfer.list; do
            [ -f "$tlist" ] || continue
            PART=$(basename "$tlist" .transfer.list)

            NEW_DAT="$OTA_DIR/${PART}.new.dat"
            NEW_DAT_BR="$OTA_DIR/${PART}.new.dat.br"
            PATCH_DAT="$OTA_DIR/${PART}.patch.dat"

            if [ -f "$NEW_DAT_BR" ]; then
              brotli -d "$NEW_DAT_BR" -o "$NEW_DAT"
            fi

            SRC_IMG=$(ls partitions/${PART}.img 2>/dev/null | head -1)
            if [ -z "$SRC_IMG" ]; then
              echo "Brak $PART"
              continue
            fi

            cp "$SRC_IMG" "output_partitions/${PART}.img"

            python3 blockimgdiff.py \
              --source "output_partitions/${PART}.img" \
              --transfer "$tlist" \
              --new_data "$NEW_DAT" \
              --patch "$PATCH_DAT" \
              --output "output_partitions/${PART}.img.new" || FAILED=1

            mv "output_partitions/${PART}.img.new" "output_partitions/${PART}.img" 2>/dev/null || true

            rm -f "$NEW_DAT" "$NEW_DAT_BR"
          done

          [ $FAILED -eq 0 ] || exit 1

      # ── static images ───────────────────────────────────────────
      - name: Copy static images
        run: |
          for img in boot.img dtbo.img vbmeta.img vbmeta_system.img; do
            if [ -f "ota_extracted/$img" ]; then
              cp "ota_extracted/$img" "output_partitions/"
            elif [ -f "base_extracted/$img" ]; then
              cp "base_extracted/$img" "output_partitions/"
            fi
          done

      # ── pack ────────────────────────────────────────────────────
      - name: Pack AP tar.md5
        run: |
          mkdir -p final

          BASE_NAME=$(find base_fw -name "*.tar.md5" | head -1 | xargs -n1 basename | sed 's/.tar.md5//')
          OUTPUT="${BASE_NAME}_patched.tar"

          cd output_partitions
          tar -H ustar -c *.img -f "../final/$OUTPUT"
          cd ..

          md5sum -t "final/$OUTPUT" >> "final/$OUTPUT"
          mv "final/$OUTPUT" "final/${OUTPUT%.tar}.tar.md5"

      # ── FIND FILE (FIX UPLOAD) ──────────────────────────────────
      - name: Find output file
        id: findfile
        run: |
          FILE=$(ls final/*.tar.md5 | head -1)
          echo "FILE=$FILE" >> $GITHUB_OUTPUT

      # ── upload ──────────────────────────────────────────────────
      - name: Upload na gofile.io
        uses: ahnafnafee/action-upload-gofile@v3.0.0
        with:
          file: ${{ steps.findfile.outputs.FILE }}
