name: Full Firmware OTA Patch (with CSC)

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ap.zip \
            "https://api.github.com/repos/durenstudnio/urban-winner/actions/artifacts/7705052240/zip"
          unzip -q ap.zip -d base_fw

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota

      - name: Download CSC package
        run: |
          mkdir -p csc_fw
          wget -q "https://github.com/adamwasowicz9-yansk/johnas/releases/download/v69/m1v7kv.zip" -O m1v7kv.zip
          unzip -q m1v7kv.zip -d csc_fw

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip lz4 wget file android-sdk-libsparse-utils python3
          
          # Stabilny link do OpenSSL 1.0 dla BlockImageUpdate
          wget -q https://launchpad.net/ubuntu/+archive/primary/+files/libssl1.0.0_1.0.2n-1ubuntu5.13_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig

          # Pobranie binariów lpunpack i lpmake z mirrora (wersja RAW)
          wget -q -O lpunpack https://github.com/whyshhnuv/lpunpack-lpmake-mirror/raw/refs/heads/Linux-debian/binary/lpunpack
          wget -q -O lpmake https://github.com/whyshhnuv/lpunpack-lpmake-mirror/raw/refs/heads/Linux-debian/binary/lpmake
          
          chmod +x lpunpack lpmake
          sudo cp lpunpack lpmake /usr/local/bin/

      - name: Download IMG Patch Tools
        run: |
          wget -q https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      - name: Extract OTA
        run: |
          mkdir ota_extracted
          OTAFILE=$(find ota -type f | head -1)
          unzip -q "$OTAFILE" -d ota_extracted

      - name: Extract AP
        run: |
          mkdir base_extracted
          cd base_extracted
          APFILE=$(find ../base_fw -name "*.tar.md5" | head -1)
          head -c -33 "$APFILE" | tar xf -

      - name: Extract CSC
        run: |
          mkdir csc_extracted
          cd csc_extracted
          CSCFILE=$(find ../csc_fw -name "*.tar.md5" | head -1)
          head -c -33 "$CSCFILE" | tar xf -

      - name: Unpack super.img to get sub-images
        run: |
          mkdir -p partitions
          
          # Sprawdzenie czy super.img to obraz rzadki (sparse) i konwersja jeśli trzeba
          if file base_extracted/super.img | grep -q "Android sparse image"; then
            echo "Converting sparse super.img to raw..."
            simg2img base_extracted/super.img base_extracted/super_raw.img
            lpunpack base_extracted/super_raw.img partitions/
          else
            lpunpack base_extracted/super.img partitions/
          fi
          
          echo "===== Extracted partitions from super ====="
          ls -lh partitions/

      - name: Prepare CSC and Extra partitions
        run: |
          # 1. Dekompresja vm-bootsys
          if [ -f base_extracted/vm-bootsys.img.lz4 ]; then
            lz4 -d base_extracted/vm-bootsys.img.lz4 partitions/vm-bootsys.img
          elif [ -f base_extracted/vm-bootsys.img ]; then
            cp base_extracted/vm-bootsys.img partitions/
          fi

          # 2. Dekompresja prism z paczki CSC
          if [ -f csc_extracted/prism.img.lz4 ]; then
            echo "Decompressing prism.img.lz4 from CSC..."
            lz4 -d csc_extracted/prism.img.lz4 partitions/prism.img
          fi

          # 3. Dekompresja optics z paczki CSC
          if [ -f csc_extracted/optics.img.lz4 ]; then
            echo "Decompressing optics.img.lz4 from CSC..."
            lz4 -d csc_extracted/optics.img.lz4 partitions/optics.img
          fi

          echo "===== Partitions ready for patching ====="
          ls -lh partitions/

      - name: Patch ALL dynamic partitions
        run: |
          echo "===== STARTING AUTOMATIC LOOP PATCHING ====="
          
          # Pętla lecąca po wszystkich listach transferowych znalezionych w OTA
          for list in ota_extracted/*.transfer.list; do
            [ -e "$list" ] || continue
            
            # Wyciąganie czystej nazwy partycji
            part_name=$(basename "$list" .transfer.list)
            
            echo "--------------------------------------------------"
            echo "Processing partition: $part_name"
            echo "--------------------------------------------------"
            
            # Sprawdzenie czy mamy pasujący plik bazowy .img
            if [ -f "partitions/${part_name}.img" ]; then
              ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
                "partitions/${part_name}.img" \
                "ota_extracted/${part_name}.transfer.list" \
                "ota_extracted/${part_name}.new.dat" \
                "ota_extracted/${part_name}.patch.dat"
            else
              echo "WARNING: Base image for $part_name not found in partitions, skipping!"
            fi
          done

      - name: Verify Result
        run: |
          echo "===== Patched Files Size ====="
          ls -lh partitions/

      # ── WBUDOWANY I NIEZALEŻNY AUTOMAT LPMAKE (ZAMIAST SKRYPTU Z 404) ───
      - name: Przebudowa dynamicznego obrazu SUPER
        run: |
          mkdir -p final_partitions
          
          echo "=== Generowanie argumentów lpmake za pomocą wbudowanego skryptu Python ==="
          python3 -c '
          import os

          op_list = "ota_extracted/dynamic_partitions_op_list"
          parts_dir = "partitions"
          output_img = "final_partitions/super.img"

          # Stałe wartości geometrii super dla Samsunga Galaxy S22 5G (r0q)
          SUPER_SIZE = 9126805504
          GROUP_SIZE = 9122611200

          # Słownik przechowujący docelowe rozmiary partycji wyciągnięte z pliku op_list
          sizes = {}

          if os.path.exists(op_list):
              with open(op_list, "r") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("resize "):
                          parts = line.split()
                          if len(parts) >= 3:
                              sizes[parts[1]] = parts[2]

          # Budujemy bazową komendę lpmake
          cmd = f"lpmake --metadata-size 65536 --super-name super --metadata-slots 2 " \
                f"--device super:{SUPER_SIZE} --group qti_dynamic_partitions:{GROUP_SIZE}"

          # Dodajemy każdą partycję, która fizycznie istnieje w folderze partitions/
          for file in os.listdir(parts_dir):
              if file.endswith(".img"):
                  part_name = file[:-4]
                  # Jeśli ota podaje nowy rozmiar, bierzemy go. Jeśli nie, sprawdzamy rozmiar pliku na dysku.
                  part_size = sizes.get(part_name, os.path.getsize(os.path.join(parts_dir, file)))
                  
                  cmd += f" --partition {part_name}:none:{part_size}:qti_dynamic_partitions"
                  cmd += f" --image {part_name}={os.path.join(parts_dir, file)}"

          cmd += f" --output {output_img}"

          # Zapisujemy wygenerowaną komendę do skryptu powłoki
          with open("lpmake_cmd.sh", "w") as out:
              out.write(cmd + "\n")
          '
          
          echo "=== Wygenerowana komenda lpmake ==="
          cat lpmake_cmd.sh
          
          echo "=== Uruchamianie rekonstrukcji super.img ==="
          bash lpmake_cmd.sh
          
          if [ -f "final_partitions/super.img" ]; then
            echo "✓ super.img został pomyślnie i perfekcyjnie odbudowany!"
            ls -lh final_partitions/super.img
          else
            echo "BŁĄD: Wbudowany generator lpmake nie utworzył pliku super.img!" && exit 1
          fi

      # ── Kopiowanie statycznych obrazów i przygotowanie AP pod Odina ───────
      - name: Skopiuj obrazy statyczne spoza super
        run: |
          for img in boot.img dtbo.img vbmeta.img vbmeta_system.img init_boot.img vendor_boot.img vm-bootsys.img; do
            OTA_IMG="ota_extracted/$img"
            BASE_IMG="base_extracted/$img"
            if [ -f "$OTA_IMG" ]; then
              cp "$OTA_IMG" "final_partitions/$img"
              echo "✓ $img (zastąpiono z OTA)"
            elif [ -f "$BASE_IMG" ]; then
              cp "$BASE_IMG" "final_partitions/$img"
              echo "  $img (zachowano z bazy)"
            fi
          done

      # ── Pakowanie gotowego tar.md5 pod Odina ────────────────────────────
      - name: Spakuj AP tar.md5
        run: |
          mkdir -p final_output
          
          # Wyciągnięcie oryginalnej nazwy pliku AP
          BASE_NAME=$(basename "$(find base_fw -name "AP_*.tar.md5" 2>/dev/null | head -1)" .tar.md5 2>/dev/null || echo "AP_Patched_Firmware")
          OUTPUT="${BASE_NAME}_patched.tar"
          
          echo "Pakowanie obrazów do: $OUTPUT"
          cd final_partitions
          
          # Standardowe pakowanie tar (Zoptymalizowane pod Odina)
          tar -c *.img -f "../final_output/$OUTPUT"
          cd ..
          
          # Doklejenie sumy kontrolnej MD5 na koniec archiwum - wymóg Odina
          echo "Generowanie sumy kontrolnej MD5..."
          md5sum -t "final_output/$OUTPUT" >> "final_output/$OUTPUT"
          mv "final_output/$OUTPUT" "final_output/${OUTPUT%.tar}.tar.md5"
          
          echo "=== Zawartość folderu wyjściowego ==="
          ls -lh final_output/

      # ── Upload do GitHub Artifacts (Zapas) ──────────────────────────────
      - name: Upload AP tar.md5 do Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AP_patched_Odin
          path: final_output/*.tar.md5
          retention-days: 7

      # ── Upload na gofile.io ──────────────────────────────────────────────
      - name: Upload na gofile.io
        uses: ahnafnafee/action-upload-gofile@v3.0.0
        with:
          file: final_output/*.tar.md5
