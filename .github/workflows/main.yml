name: Full Firmware OTA Patch (with CSC)

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Zwolnienie miejsca na dysku ─────────────────────────────────────
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      # ── Pobieranie oprogramowania i artefaktów ──────────────────────────
      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ap.zip \
            "https://api.github.com/repos/durenstudnio/urban-winner/actions/artifacts/7705052240/zip"
          unzip -q ap.zip -d base_fw

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota

      - name: Download CSC package
        run: |
          mkdir -p csc_fw
          wget -nv "https://github.com/adamwasowicz9-yansk/johnas/releases/download/v69/m1v7kv.zip" -O m1v7kv.zip
          unzip -q m1v7kv.zip -d csc_fw

      # ── Instalacja dependencies systemowych ─────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip lz4 wget file android-sdk-libsparse-utils python3
          
          echo "Pobieranie libssl1.0.0..."
          wget -nv https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig

          echo "Pobieranie lpunpack i lpmake..."
          wget -nv -O lpunpack https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack
          wget -nv -O lpmake https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpmake
          
          chmod +x lpunpack lpmake
          sudo cp lpunpack lpmake /usr/local/bin/

      - name: Download IMG Patch Tools
        run: |
          wget -nv https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      # ── Ekstrakcja paczek ───────────────────────────────────────────────
      - name: Extract OTA
        run: |
          mkdir ota_extracted
          OTAFILE=$(find ota -type f | head -1)
          unzip -q "$OTAFILE" -d ota_extracted

      - name: Wypakuj AP z artefaktu (obsługa tar.md5)
        run: |
          mkdir -p base_extracted
          # Szukamy pliku .tar.md5 (typowe dla firmware Samsung)
          TARFILE=$(find base_fw -name "*.tar.md5" | head -1)
          if [ -n "$TARFILE" ]; then
            echo "Znaleziono AP jako tar.md5: $TARFILE"
            head -c -33 "$TARFILE" | tar -x -C base_extracted/
          else
            # Jeśli nie ma tar.md5, może być zwykły .tar
            TARFILE=$(find base_fw -name "*.tar" | head -1)
            if [ -n "$TARFILE" ]; then
              echo "Znaleziono AP jako .tar: $TARFILE"
              tar -x -f "$TARFILE" -C base_extracted/
            fi
          fi

          # Kopiujemy wszystkie .lz4 i .img (jeśli jakieś są) do głównego folderu
          find base_extracted -name "*.lz4" -exec cp {} base_extracted/ \; 2>/dev/null || true
          find base_extracted -name "*.img" -exec cp {} base_extracted/ \; 2>/dev/null || true

          echo "=== Zawartość folderu bazowego po ekstrakcji ==="
          ls -lh base_extracted/

      - name: Extract CSC
        run: |
          mkdir csc_extracted
          cd csc_extracted
          CSCFILE=$(find ../csc_fw -name "*.tar.md5" | head -1)
          head -c -33 "$CSCFILE" | tar xf -

      # ── Dekompresja lz4 dla bazy AP ─────────────────────────────────────
      - name: Zdekompresuj obrazy lz4
        run: |
          cd base_extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            echo "Dekompresuję: $f"
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done
          echo "=== Rozpakowane obrazy bazy ==="
          ls -lh *.img 2>/dev/null || echo "Brak .img"

      # ── Rozbijanie kontenera super.img na podobrazy ──────────────────────
      - name: Unpack super.img to get sub-images
        run: |
          mkdir -p partitions
          
          # Szukamy super.img w podkatalogach, na wypadek gdyby struktura w zip była głęboka
          SUPER_PATH=$(find base_extracted -name "super.img" | head -1)
          
          if [ -z "$SUPER_PATH" ]; then
            echo "BŁĄD: Nie znaleziono pliku super.img w base_extracted!"
            ls -R base_extracted
            exit 1
          fi

          if file "$SUPER_PATH" | grep -q "Android sparse image"; then
            echo "Converting sparse super.img to raw..."
            simg2img "$SUPER_PATH" base_extracted/super_raw.img
            lpunpack base_extracted/super_raw.img partitions/
          else
            lpunpack "$SUPER_PATH" partitions/
          fi
          
          echo "===== Extracted partitions from super ====="
          ls -lh partitions/

      # ── Przygotowanie obrazów CSC i Extra (Z dala od folderu 'partitions') ──
      - name: Prepare CSC and Extra partitions
        run: |
          mkdir -p extra_partitions
          
          if [ -f base_extracted/vm-bootsys.img ]; then
            cp base_extracted/vm-bootsys.img extra_partitions/
          fi

          if [ -f csc_extracted/prism.img.lz4 ]; then
            echo "Decompressing prism.img.lz4 from CSC..."
            lz4 -d csc_extracted/prism.img.lz4 extra_partitions/prism.img
          fi

          if [ -f csc_extracted/optics.img.lz4 ]; then
            echo "Decompressing optics.img.lz4 from CSC..."
            lz4 -d csc_extracted/optics.img.lz4 extra_partitions/optics.img
          fi

          echo "===== Extra/CSC Partitions ready ====="
          ls -lh extra_partitions/

      # ── Łatanie partycji dynamicznych przez BlockImageUpdate ─────────────
      - name: Patch ALL dynamic partitions
        run: |
          echo "===== STARTING AUTOMATIC LOOP PATCHING ====="
          
          for list in ota_extracted/*.transfer.list; do
            [ -e "$list" ] || continue
            part_name=$(basename "$list" .transfer.list)
            
            echo "Processing partition: $part_name"
            
            if [ -f "partitions/${part_name}.img" ]; then
              ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
                "partitions/${part_name}.img" \
                "ota_extracted/${part_name}.transfer.list" \
                "ota_extracted/${part_name}.new.dat" \
                "ota_extracted/${part_name}.patch.dat"
            else
              echo "WARNING: Base image for $part_name not found in partitions, skipping!"
            fi
          done

      # ── Rekonstrukcja SUPER (tylko partycje z dynamic_partitions_op_list) ──
      - name: Przebudowa dynamicznego obrazu SUPER
        run: |
          mkdir -p final_partitions
          mkdir -p super_input
          
          # Kopiujemy wszystkie obrazy z partitions do super_input (potem odfiltrujemy)
          cp partitions/*.img super_input/ 2>/dev/null || true

          echo "=== Dynamiczne generowanie argumentów lpmake (filtrowanie po op_list) ==="
          python3 -c '
          import os
          import math

          op_list = "ota_extracted/dynamic_partitions_op_list"
          parts_dir = "super_input"
          output_img = "final_partitions/super.img"

          # Rozmiary dla serii S22 (S901E) – dostosuj jeśli potrzeba
          SUPER_SIZE = 9126809600
          GROUP_SIZE = 9122611200

          def align_to_block(size):
              return int(math.ceil(size / 4096.0) * 4096)

          # Wczytaj nazwy partycji z op_list (linie "resize <name> <size>")
          part_names = set()
          sizes = {}
          if os.path.exists(op_list):
              with open(op_list, "r") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("resize "):
                          parts = line.split()
                          if len(parts) >= 3:
                              name = parts[1]
                              size = int(parts[2])
                              sizes[name] = size
                              part_names.add(name)

          cmd = f"lpmake --metadata-size 65536 --super-name super --metadata-slots 2 " \
                f"--device super:{SUPER_SIZE} --group qti_dynamic_partitions:{GROUP_SIZE}"

          # Dodajemy tylko te partycje, które są wymienione w op_list
          for file in os.listdir(parts_dir):
              if file.endswith(".img"):
                  part_name = file[:-4]
                  if part_name not in part_names:
                      print(f"Pomijam {part_name} – brak wpisu w dynamic_partitions_op_list")
                      continue
                  raw_size = sizes.get(part_name, os.path.getsize(os.path.join(parts_dir, file)))
                  part_size = align_to_block(raw_size)
                  cmd += f" --partition {part_name}:none:{part_size}:qti_dynamic_partitions"
                  cmd += f" --image {part_name}={os.path.join(parts_dir, file)}"

          cmd += f" --output {output_img}"

          with open("lpmake_cmd.sh", "w") as out:
              out.write(cmd + "\n")
          '
          
          echo "=== Wygenerowana komenda lpmake ==="
          cat lpmake_cmd.sh
          
          echo "=== Uruchamianie rekonstrukcji super.img ==="
          bash lpmake_cmd.sh
          
          if [ -f "final_partitions/super.img" ]; then
            echo "✓ super.img został pomyślnie odbudowany!"
            ls -lh final_partitions/super.img
          else
            echo "BŁĄD: lpmake nie utworzył pliku super.img!" && exit 1
          fi

      # ── Kopiowanie statycznych obrazów i CSC (Na zewnątrz super) ─────────
      - name: Skopiuj obrazy statyczne spoza super
        run: |
          # Zbieramy obrazy z ota, bazy i naszego folderu extra_partitions (CSC)
          for img in boot.img dtbo.img vbmeta.img vbmeta_system.img init_boot.img vendor_boot.img vm-bootsys.img prism.img optics.img; do
            OTA_IMG="ota_extracted/$img"
            EXTRA_IMG="extra_partitions/$img"
            BASE_IMG="base_extracted/$img"
            
            if [ -f "$OTA_IMG" ]; then
              cp "$OTA_IMG" "final_partitions/$img"
              echo "✓ $img (zastąpiono nowym z OTA)"
            elif [ -f "$EXTRA_IMG" ]; then
              cp "$EXTRA_IMG" "final_partitions/$img"
              echo "✓ $img (skopiowano z folderu extra/CSC)"
            elif [ -f "$BASE_IMG" ]; then
              cp "$BASE_IMG" "final_partitions/$img"
              echo "  $img (zachowano oryginalny z bazy)"
            fi
          done

      # ── Pakowanie gotowego tar.md5 pod Odina ────────────────────────────
      - name: Spakuj AP tar.md5
        run: |
          mkdir -p final_output
          
          CSC_ORIGINAL=$(find csc_fw -name "*.tar.md5" 2>/dev/null | head -1)
          if [ -n "$CSC_ORIGINAL" ]; then
            BASE_NAME=$(basename "$CSC_ORIGINAL" .tar.md5 | sed 's/^CSC_/AP_/')
          else
            BASE_NAME="AP_Patched_Firmware"
          fi
          
          OUTPUT="${BASE_NAME}_patched.tar"
          
          echo "Pakowanie obrazów do: $OUTPUT"
          cd final_partitions
          
          tar -c *.img -f "../final_output/$OUTPUT"
          cd ..
          
          echo "Generowanie sumy kontrolnej MD5..."
          md5sum -t "final_output/$OUTPUT" >> "final_output/$OUTPUT"
          mv "final_output/$OUTPUT" "final_output/${OUTPUT%.tar}.tar.md5"
          
          echo "=== Zawartość folderu wyjściowego ==="
          ls -lh final_output/

      # ── Upload do GitHub Artifacts (Zapas) ──────────────────────────────
      - name: Upload AP tar.md5 do Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AP_patched_Odin
          path: final_output/*.tar.md5
          retention-days: 7

      # ── Upload na gofile.io ──────────────────────────────────────────────
      - name: Upload na gofile.io
        uses: ahnafnafee/action-upload-gofile@v3.0.0
        with:
          file: final_output/*.tar.md5
