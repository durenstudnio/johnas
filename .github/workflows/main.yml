name: Samsung BLOCK OTA Apply

on:
  workflow_dispatch:

jobs:
  apply-ota:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Zwolnij miejsce na dysku (~20GB) ────────────────────────────────
      - name: Zwolnij miejsce na dysku
        run: |
          echo "Przed:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "Po:"
          df -h /

      # ── Narzędzia systemowe ──────────────────────────────────────────────
      - name: Zainstaluj zależności
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            lz4 brotli python3 python3-pip \
            zip unzip tar pv wget curl
          pip3 install gdown

      # ── Sprawdź wolne miejsce ────────────────────────────────────────────
      - name: Sprawdź dysk
        run: df -h

      # ── Pobierz OTA zip z Google Drive (STAŁE ID) ──────────────────────
      - name: Pobierz OTA zip z Google Drive
        run: |
          mkdir -p ota
          gdown "1YnKZ9qrNmfaEDrI10pkdkSCVevBoUxBh" -O ota/ota.zip
          SIZE=$(stat -c%s ota/ota.zip 2>/dev/null || echo 0)
          if [ "$SIZE" -lt 1048576 ]; then
            echo "❌ Pobrany plik OTA ma tylko $SIZE bajtów"
            exit 1
          fi
          ls -lh ota/

      # ── Pobierz bazowy AP (ZIP) i rozpakuj go (STAŁE ID) ──────────────
      - name: Pobierz bazowy AP z Google Drive i rozpakuj ZIP
        run: |
          mkdir -p base_fw
          gdown "1ugH_mcYrIwuPgUJh4qeeE4AucdzbgNHI" -O base_fw/base.zip

          unzip -q base_fw/base.zip -d base_fw/

          TAR_MD5=$(find base_fw/ -maxdepth 1 -name "*.tar.md5" | head -1)
          if [ -z "$TAR_MD5" ]; then
            echo "❌ Nie znaleziono pliku .tar.md5 w archiwum ZIP"
            exit 1
          fi

          mv "$TAR_MD5" base_fw/AP_base.tar.md5
          rm -f base_fw/base.zip
          ls -lh base_fw/

      # ── Wypakuj OTA zip ──────────────────────────────────────────────────
      - name: Wypakuj OTA zip
        run: |
          mkdir -p ota_extracted
          unzip -q ota/ota.zip -d ota_extracted
          ls -lh ota_extracted/
          rm ota/ota.zip

      # ── Wypakuj bazowy AP tar (poprawione) ─────────────────────────────
      - name: Wypakuj AP tar
        run: |
          mkdir -p base_extracted
          cd base_extracted
          # Usuń 33-bajtowy suffix MD5 (32 bajty + newline) i wypakuj
          head -c -33 ../base_fw/AP_base.tar.md5 | tar x
          ls -lh
          rm ../base_fw/AP_base.tar.md5

      # ── Zdekompresuj obrazy lz4 ─────────────────────────────────────────
      - name: Zdekompresuj obrazy lz4
        run: |
          cd base_extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            echo "Dekompresuję: $f"
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done
          ls -lh *.img 2>/dev/null || echo "Brak .img"

      # ── lpunpack – wyciągnij partycje z super.img ──────────────────────
      - name: Zainstaluj lpunpack (z Twojego źródła)
        run: |
          wget -q --header="User-Agent: Mozilla/5.0" \
            https://github.com/whyshhnuv/lpunpack-lpmake-mirror/raw/refs/heads/Linux-debian/binary/lpunpack
          chmod +x lpunpack
          sudo mv lpunpack /usr/local/bin/
          lpunpack --help || echo "lpunpack installed"

      - name: Wypakuj partycje z super.img
        run: |
          mkdir -p partitions
          if [ -f base_extracted/super.img ]; then
            lpunpack base_extracted/super.img partitions/
            ls -lh partitions/
          else
            echo "Brak super.img – kopiuję osobne obrazy"
            cp base_extracted/*.img partitions/ 2>/dev/null || true
          fi

      # ── Pobierz narzędzia BLOCK OTA (commaai) ──────────────────────────
      - name: Pobierz narzędzia BLOCK OTA
        run: |
          wget -q -O blockimgdiff.py \
            https://raw.githubusercontent.com/commaai/android_build/refs/heads/master/tools/releasetools/blockimgdiff.py
          wget -q -O rangelib.py \
            https://raw.githubusercontent.com/commaai/android_build/refs/heads/master/tools/releasetools/rangelib.py

      # ── Zastosuj patche dla każdej partycji ─────────────────────────────
      - name: Zastosuj BLOCK OTA patche
        run: |
          mkdir -p output_partitions
          OTA_DIR="ota_extracted"
          FAILED=0

          for tlist in "$OTA_DIR"/*.transfer.list; do
            [ -f "$tlist" ] || continue
            PART=$(basename "$tlist" .transfer.list)
            echo "━━━ Partycja: $PART ━━━"

            NEW_DAT_BR="$OTA_DIR/${PART}.new.dat.br"
            NEW_DAT="$OTA_DIR/${PART}.new.dat"
            PATCH_DAT="$OTA_DIR/${PART}.patch.dat"

            if [ -f "$NEW_DAT_BR" ]; then
              echo "  Dekompresuję brotli..."
              brotli -d "$NEW_DAT_BR" -o "$NEW_DAT"
            fi

            SRC_IMG=$(ls partitions/${PART}.img 2>/dev/null | head -1)

            if [ -z "$SRC_IMG" ]; then
              echo "  ⚠️  Brak źródłowego obrazu dla $PART, pomijam"
              continue
            fi

            echo "  Źródło: $SRC_IMG"
            cp "$SRC_IMG" "output_partitions/${PART}.img"

            python3 blockimgdiff.py \
              --source "output_partitions/${PART}.img" \
              --transfer "$tlist" \
              --new_data "$NEW_DAT" \
              --patch "$PATCH_DAT" \
              --output "output_partitions/${PART}.img.new"

            if [ $? -eq 0 ]; then
              mv "output_partitions/${PART}.img.new" "output_partitions/${PART}.img"
              echo "  ✓ Gotowe"
            else
              echo "  ✗ Błąd dla $PART"
              FAILED=1
            fi

            rm -f "$NEW_DAT" "$NEW_DAT_BR"
          done

          [ $FAILED -eq 0 ] || (echo "❌ Niektóre partycje nie zostały spatchowane!" && exit 1)
          ls -lh output_partitions/

      # ── Skopiuj obrazy spoza dynamic partitions ─────────────────────────
      - name: Skopiuj obrazy statyczne
        run: |
          for img in boot.img dtbo.img vbmeta.img vbmeta_system.img; do
            OTA_IMG="ota_extracted/$img"
            BASE_IMG="base_extracted/$img"
            if [ -f "$OTA_IMG" ]; then
              cp "$OTA_IMG" "output_partitions/$img"
              echo "✓ $img (z OTA)"
            elif [ -f "$BASE_IMG" ]; then
              cp "$BASE_IMG" "output_partitions/$img"
              echo "  $img (z bazy)"
            fi
          done

      # ── Spakuj nowy AP tar.md5 (dynamiczna nazwa) ──────────────────────
      - name: Spakuj AP tar.md5
        run: |
          mkdir -p final
          BASE_NAME=$(basename "$(find base_fw/ -name "*.tar.md5" 2>/dev/null | head -1)" .tar.md5 2>/dev/null || echo "AP_patched")
          OUTPUT="${BASE_NAME}_patched.tar"

          cd output_partitions
          tar -H ustar -c *.img -f "../final/$OUTPUT"
          cd ..

          md5sum -t "final/$OUTPUT" >> "final/$OUTPUT"
          mv "final/$OUTPUT" "final/${OUTPUT%.tar}.tar.md5"

          ls -lh final/
          df -h

      # ── Upload na gofile.io ──────────────────────────────────────────────
      - name: Upload na gofile.io
        uses: ahnafnafee/action-upload-gofile@v3.0.0
        with:
          file: final/*.tar.md5
