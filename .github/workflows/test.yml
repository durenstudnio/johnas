name: Inspect OTA Artifact

on:
  workflow_dispatch:

jobs:
  inspect:
    runs-on: ubuntu-latest

    steps:
      - name: Download OTA Artifact
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ota

          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -L \
            "https://api.github.com/repos/adamwasowicz9-yansk/johnas/actions/artifacts/7709183127/zip" \
            -o ota/artifact.zip

          ls -lh ota/artifact.zip

      - name: Inspect Artifact
        run: |
          echo "===== ZIP CONTENT ====="
          unzip -l ota/artifact.zip

      - name: Extract Artifact
        run: |
          mkdir extracted
          unzip -q ota/artifact.zip -d extracted

          echo ""
          echo "===== TREE ====="
          find extracted | sort

          echo ""
          echo "===== FILES ====="
          find extracted -type f | sort
