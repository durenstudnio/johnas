name: test-product-patch

on:
  workflow_dispatch:

jobs:
  test-product:
    runs-on: ubuntu-latest

    steps:
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip lz4 wget file android-sdk-libsparse-utils

          wget -nv https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig

          wget -nv -O lpunpack https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack
          chmod +x lpunpack
          sudo cp lpunpack /usr/local/bin/

          wget -nv https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ap.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7736838535/zip"
          unzip -q ap.zip -d base_fw
          rm -f ap.zip
          df -h /

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota
          rm -f ota.zip
          df -h /

      - name: Extract OTA product files only
        run: |
          mkdir ota_extracted
          OTAFILE=$(find ota -type f | head -1)

          # Extract just the files we need for this test (saves time/space)
          unzip -l "$OTAFILE" | grep -i "^.*product" || true
          unzip -q -o "$OTAFILE" -d ota_extracted "product.transfer.list" "product.new.dat*" "product.patch.dat" "dynamic_partitions_op_list" || \
          unzip -q "$OTAFILE" -d ota_extracted

          echo "=== product files from OTA ==="
          ls -lh ota_extracted/ | grep product

          echo "=== dynamic_partitions_op_list (resize entries) ==="
          grep -E "^resize " ota_extracted/dynamic_partitions_op_list || echo "(brak pliku albo brak wpisów resize)"

      - name: Wypakuj AP (z obsługą zagnieżdżonych zipów)
        run: |
          mkdir -p base_extracted

          # FIX: poprzednio rozpakowywaliśmy CAŁY zagnieżdżony zip (BL+AP+CP+CSC+HOME_CSC),
          # co zajmowało ~10GB miejsca na dysku dla testu, który potrzebuje tylko AP.
          # Teraz wyciągamy z niego TYLKO plik AP_*.
          for i in 1 2 3; do
            FOUND_TAR=$(find base_fw -name "*.tar.md5" -o -name "*.tar" 2>/dev/null | head -1)
            [ -n "$FOUND_TAR" ] && break
            NESTED_ZIP=$(find base_fw -name "*.zip" | head -1)
            [ -z "$NESTED_ZIP" ] && break
            echo "Rozpakowuję TYLKO plik AP_* z zagnieżdżonego zipa: $NESTED_ZIP"
            unzip -l "$NESTED_ZIP" | grep -i "^.*AP_" || true
            unzip -q -o "$NESTED_ZIP" -d base_fw "AP_*" || unzip -q -o "$NESTED_ZIP" -d base_fw
            rm -f "$NESTED_ZIP"
            df -h /
          done

          TARFILE=$(find base_fw -name "*.tar.md5" | head -1)
          if [ -z "$TARFILE" ]; then
            TARFILE=$(find base_fw -name "*.tar" | head -1)
          fi

          if [ -z "$TARFILE" ]; then
            echo "BŁĄD: Nie znaleziono .tar.md5 ani .tar w AP!"
            find base_fw -maxdepth 3
            exit 1
          fi

          echo "Znaleziono AP: $TARFILE"

          # Wyciągamy TYLKO super.img / super.img.lz4 z tar (tar przeskakuje resztę bez zapisu na dysk)
          ENTRY=$(head -c -33 "$TARFILE" | tar -t 2>/dev/null | grep -E "^super\.img" | head -1)
          if [ -n "$ENTRY" ]; then
            echo "Wyciągam tylko: $ENTRY"
            head -c -33 "$TARFILE" | tar -x -C base_extracted/ "$ENTRY"
          else
            echo "Nie znalazłem super.img w liście tar, rozpakowuję całość..."
            head -c -33 "$TARFILE" | tar -x -C base_extracted/
          fi

          # FIX: usuwamy AP_xxx.tar.md5 (~8,5GB) — już niepotrzebny, mamy super.img.lz4
          rm -f "$TARFILE"

          echo "=== Po ekstrakcji super.img ==="
          ls -lh base_extracted/
          echo "=== Pozostałość w base_fw (powinno być ~puste) ==="
          du -sh base_fw 2>/dev/null || true
          df -h /

      - name: Zdekompresuj super.img.lz4 jeśli potrzeba
        run: |
          cd base_extracted
          if [ -f super.img.lz4 ]; then
            lz4 -d super.img.lz4 super.img
            rm super.img.lz4
          fi
          ls -lh
          df -h /

      - name: Wyciągnij TYLKO partycję product z super.img
        run: |
          mkdir -p partitions

          SUPER_PATH=$(find base_extracted -name "super.img" | head -1)
          if [ -z "$SUPER_PATH" ]; then
            echo "BŁĄD: nie znaleziono super.img!"
            exit 1
          fi

          if file "$SUPER_PATH" | grep -q "Android sparse image"; then
            echo "Konwertuję sparse -> raw..."
            simg2img "$SUPER_PATH" base_extracted/super_raw.img
            rm -f "$SUPER_PATH"
            SUPER_PATH=base_extracted/super_raw.img
          fi

          # lpunpack supports extracting a single partition with -p
          lpunpack -p product "$SUPER_PATH" partitions/ || lpunpack -p product_a "$SUPER_PATH" partitions/

          # FIX: super.img/super_raw.img (~9GB każdy) już niepotrzebne — usuwamy
          # natychmiast, zanim zaczniemy patchowanie (które i tak potrzebuje miejsca
          # na cache/stash).
          rm -f "$SUPER_PATH"

          echo "=== Wyciągnięte ==="
          ls -lh partitions/
          df -h /

          if [ ! -f partitions/product.img ] && [ ! -f partitions/product_a.img ]; then
            echo "BŁĄD: nie udało się wyciągnąć product z super.img"
            exit 1
          fi

          # normalize name to product.img
          # FIX: pod `bash -e`, samo "[ -f x ] && cmd" zwraca exit 1 (i ubija krok)
          # gdy plik nie istnieje — nawet jeśli to oczekiwane i nieszkodliwe.
          if [ -f partitions/product_a.img ]; then
            mv partitions/product_a.img partitions/product.img
          fi

      # ── KLUCZOWY KROK (wcześniej brakujący): resize obrazu do rozmiaru z OTA ──
      # Z tutoriala: "You must resize images exactly as defined in
      # dynamic_partitions_op_list. If you skip this step, patching will abort"
      # (albo, jak widzieliśmy — zawiesi się bez żadnego komunikatu błędu).
      - name: Resize product.img zgodnie z dynamic_partitions_op_list (KROK OBOWIĄZKOWY)
        run: |
          OP_LIST="ota_extracted/dynamic_partitions_op_list"

          if [ ! -f "$OP_LIST" ]; then
            echo "⚠️  Brak dynamic_partitions_op_list w OTA — nie mogę zweryfikować docelowego rozmiaru."
            echo "    Kontynuuję z oryginalnym rozmiarem product.img, ale to ryzykowne."
            exit 0
          fi

          echo "=== Pełna zawartość op_list dla product ==="
          grep -i "product" "$OP_LIST" || echo "(brak wpisów dla product)"

          # Szukamy linii w stylu: "resize product 1234567890" lub "resize product_a 1234567890"
          TARGET_SIZE=$(grep -E "^resize product(_a)? " "$OP_LIST" | awk '{print $3}' | tail -1)

          if [ -z "$TARGET_SIZE" ]; then
            echo "ℹ️  Brak wpisu 'resize product' w op_list — partycja może nie wymagać zmiany rozmiaru."
            CURRENT_SIZE=$(stat -c%s partitions/product.img)
            echo "    Obecny rozmiar product.img: $CURRENT_SIZE bajtów (bez zmian)"
            exit 0
          fi

          CURRENT_SIZE=$(stat -c%s partitions/product.img)
          echo "Obecny rozmiar product.img:   $CURRENT_SIZE bajtów"
          echo "Docelowy rozmiar (z op_list): $TARGET_SIZE bajtów"

          if [ "$CURRENT_SIZE" -eq "$TARGET_SIZE" ]; then
            echo "✓ Rozmiar już się zgadza, nic do zrobienia."
          else
            echo "Wykonuję: truncate -s $TARGET_SIZE partitions/product.img"
            truncate -s "$TARGET_SIZE" partitions/product.img
            echo "✓ Nowy rozmiar: $(stat -c%s partitions/product.img) bajtów"
          fi

      # ── Faktyczny test patchowania, z monitoringiem i timeoutem ─────────
      - name: Patch product (z monitoringiem zasobów + timeout)
        run: |
          cp partitions/product.img partitions/product.img.bak

          echo "=== Stan przed patchowaniem ==="
          df -h /
          free -h

          # Monitor w tle: co 30s loguje df/free/czy proces żyje
          (
            while true; do
              sleep 30
              echo "----- MONITOR $(date -u +%H:%M:%S) -----"
              df -h / | tail -1
              free -h | grep Mem
              if pgrep -f BlockImageUpdate > /dev/null; then
                echo "BlockImageUpdate: WCIĄŻ DZIAŁA"
              else
                echo "BlockImageUpdate: NIE DZIAŁA (zakończony albo jeszcze nie wystartował)"
              fi
            done
          ) &
          MONITOR_PID=$!

          echo "=== Startuję patchowanie product (limit 20 min) ==="
          set +e
          timeout 1200 ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
            partitions/product.img \
            ota_extracted/product.transfer.list \
            ota_extracted/product.new.dat \
            ota_extracted/product.patch.dat
          PATCH_EXIT=$?
          set -e

          kill "$MONITOR_PID" 2>/dev/null || true

          echo ""
          echo "=== Stan po patchowaniu (exit $PATCH_EXIT) ==="
          df -h /
          free -h

          if [ $PATCH_EXIT -eq 124 ]; then
            echo "❌ TIMEOUT — patchowanie nie zakończyło się w 20 minut. To potwierdza zawieszenie, nie tylko 'wolne' patchowanie."
          elif [ $PATCH_EXIT -ne 0 ]; then
            echo "❌ Patchowanie zakończone błędem (exit $PATCH_EXIT) — prawdopodobnie hash mismatch AP/OTA."
          else
            echo "✅ Patchowanie product zakończone sukcesem!"
          fi

          echo ""
          echo "=== Porównanie rozmiarów ==="
          ls -lh partitions/product.img partitions/product.img.bak
