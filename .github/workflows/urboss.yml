name: urboss

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Zwolnienie miejsca na dysku ─────────────────────────────────────
      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      # ── Równoległe pobieranie i instalacja wszystkiego ──────────────────
      - name: Parallel Download & Install Dependencies
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p firmware_zip ota ota_extracted
          PIDS=()

          # 1. Pobieranie Firmware (w tle)
          (curl -L -f -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o firmware.zip \
            "https://api.github.com/repos/durenstudnio/urban-winner/actions/artifacts/7768363658/zip") &
          PIDS+=($!)

          # 2. Pobieranie OTA (w tle)
          (curl -L -f -s \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip") &
          PIDS+=($!)

          # 3. Pobieranie libssl (w tle)
          (wget -nv -q -O libssl.deb "https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb") &
          PIDS+=($!)

          # 4. Pobieranie lpunpack (w tle)
          (wget -nv -q -O lpunpack "https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack") &
          PIDS+=($!)

          # 5. Pobieranie lpmake (w tle)
          (wget -nv -q -O lpmake "https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpmake") &
          PIDS+=($!)

          # 6. Pobieranie IMG Patch Tools (w tle)
          (wget -nv -q -O imgpatch.zip "https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip") &
          PIDS+=($!)

          # 7. Instalacja apt-get (w tle)
          (sudo apt-get update -qq && sudo apt-get install -y -qq unzip zip lz4 wget file android-sdk-libsparse-utils python3 jq) &
          PIDS+=($!)

          # Czekanie na zakończenie wszystkich procesów w tle
          echo "Oczekiwanie na zakończenie wszystkich pobierań i instalacji..."
          FAIL=0
          for pid in "${PIDS[@]}"; do
            if ! wait "$pid"; then
              echo "BŁĄD: Proces $pid zakończył się niepowodzeniem."
              FAIL=1
            fi
          done
          
          if [ "$FAIL" -eq 1 ]; then
            exit 1
          fi

          # Post-processing: Rozpakowanie artefaktów (z automatycznym rozpakowywaniem zagnieżdżonych zipów)
          echo "Rozpakowywanie firmware.zip..."
          unzip -q firmware.zip -d firmware_zip
          rm -f firmware.zip
          find firmware_zip -type f -name "*.zip" -exec unzip -q -o {} -d firmware_zip/ \;

          echo "Rozpakowywanie ota.zip..."
          unzip -q ota.zip -d ota
          rm -f ota.zip
          find ota -type f -name "*.zip" -exec unzip -q -o {} -d ota/ \;

          OTAFILE=$(find ota -type f | head -1)
          if [ -n "$OTAFILE" ]; then
            unzip -q "$OTAFILE" -d ota_extracted
            find ota_extracted -type f -name "*.zip" -exec unzip -q -o {} -d ota_extracted/ \;
          fi

          # Post-processing: Instalacja pobranych narzędzi
          sudo dpkg -i libssl.deb || true
          sudo ldconfig
          rm -f libssl.deb

          chmod +x lpunpack lpmake
          sudo cp lpunpack lpmake /usr/local/bin/

          unzip -q imgpatch.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*
          rm -f imgpatch.zip

          echo "✓ Wszystko pobrano, zainstalowano i rozpakowano."

      # ── Rozpakowanie wszystkich komponentów firmware ────────────────────
      - name: Rozpakuj wszystkie komponenty firmware
        run: |
          mkdir -p base_extracted csc_extracted final_output

          # Szukamy wszystkich plików .tar.md5 w firmware_zip (rekursywnie)
          TARS=$(find firmware_zip -type f -name "*.tar.md5")
          
          if [ -z "$TARS" ]; then
            echo "BŁĄD: Nie znaleziono żadnych plików *.tar.md5 w firmware_zip!"
            find firmware_zip -type f -exec ls -lh {} \;
            exit 1
          fi

          echo "$TARS" | while IFS= read -r tar; do
            case $(basename "$tar") in
              BL_*)
                echo "BL: $tar → kopiuję do final_output"
                cp "$tar" final_output/$(basename "$tar")
                ;;
              AP_*)
                echo "AP: $tar → wyodrębniam do base_extracted"
                head -c -33 "$tar" | tar -x -C base_extracted/
                ;;
              CP_*)
                echo "CP: $tar → kopiuję do final_output"
                cp "$tar" final_output/$(basename "$tar")
                ;;
              CSC_*|HOME_CSC_*)
                if [[ $(basename "$tar") == CSC_* ]]; then
                  echo "CSC: $tar → wyodrębniam do csc_extracted"
                  head -c -33 "$tar" | tar -x -C csc_extracted/
                else
                  echo "HOME_CSC: $tar → kopiuję do final_output (bez zmian)"
                  cp "$tar" final_output/$(basename "$tar")
                fi
                ;;
              *)
                echo "Nieznany plik: $tar"
                ;;
            esac
          done

          rm -rf firmware_zip

          echo "=== Zawartość base_extracted ==="
          ls -lh base_extracted/ || echo "pusto"
          echo "=== Zawartość csc_extracted ==="
          ls -lh csc_extracted/ || echo "pusto"
          echo "=== Zawartość final_output (BL, CP, HOME_CSC) ==="
          ls -lh final_output/ || echo "pusto"

      # ── Dekompresja lz4 dla AP ──────────────────────────────────────────
      - name: Zdekompresuj obrazy lz4 (AP)
        run: |
          cd base_extracted
          find . -name "*.lz4" | while IFS= read -r f; do
            echo "Dekompresuję: $f"
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done
          echo "=== Rozpakowane obrazy bazy (AP) ==="
          ls -lh *.img 2>/dev/null || find . -name "*.img" -exec ls -lh {} \;

      # ── Przygotowanie CSC i extra partitions (dekompresja lz4 CSC) ──────
      - name: Prepare CSC and Extra partitions
        run: |
          mkdir -p extra_partitions

          cd csc_extracted
          find . -name "*.lz4" | while IFS= read -r f; do
            echo "Dekompresuję CSC: $f"
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done
          cd ..

          VM_FILE=$(find base_extracted -name "vm-bootsys.img" | head -1)
          if [ -n "$VM_FILE" ]; then
            cp "$VM_FILE" extra_partitions/
          fi
          
          PRISM_FILE=$(find csc_extracted -name "prism.img" | head -1)
          if [ -n "$PRISM_FILE" ]; then
            cp "$PRISM_FILE" extra_partitions/prism.img
          fi
          
          OPTICS_FILE=$(find csc_extracted -name "optics.img" | head -1)
          if [ -n "$OPTICS_FILE" ]; then
            cp "$OPTICS_FILE" extra_partitions/optics.img
          fi

          echo "===== Extra/CSC Partitions ready ====="
          ls -lh extra_partitions/

      # ── Rozbijanie kontenera super.img na podobrazy ──────────────────────
      - name: Unpack super.img to get sub-images
        run: |
          mkdir -p partitions
          SUPER_PATH=$(find base_extracted -name "super.img" | head -1)

          if [ -z "$SUPER_PATH" ]; then
            echo "BŁĄD: Nie znaleziono pliku super.img w base_extracted!"
            find base_extracted -type f -exec ls -lh {} \;
            exit 1
          fi

          FILE_INFO=$(file "$SUPER_PATH")
          echo "Info o super.img: $FILE_INFO"

          if echo "$FILE_INFO" | grep -q "Android sparse image"; then
            TOTAL_BLOCKS=$(echo "$FILE_INFO" | grep -oE "Total of [0-9]+" | grep -oE "[0-9]+")
            BLOCK_SIZE=$(echo "$FILE_INFO" | grep -oE "[0-9]+-byte" | grep -oE "[0-9]+")
            REAL_SUPER_SIZE=$((TOTAL_BLOCKS * BLOCK_SIZE))
          else
            REAL_SUPER_SIZE=$(stat -c%s "$SUPER_PATH")
          fi
          echo "Prawdziwy rozmiar super.img: $REAL_SUPER_SIZE bajtów"
          echo "$REAL_SUPER_SIZE" > base_extracted/super_real_size.txt

          echo "Próbuję lpunpack bezpośrednio na sparse super.img..."
          if lpunpack "$SUPER_PATH" partitions/; then
            echo "✓ lpunpack zadziałał bezpośrednio na sparse super.img."
          else
            echo "⚠️  lpunpack nie poradził sobie z sparse super.img — fallback: konwersja do raw."
            simg2img "$SUPER_PATH" base_extracted/super_raw.img
            lpunpack base_extracted/super_raw.img partitions/
            rm -f base_extracted/super_raw.img
          fi

          echo "===== Extracted partitions from super ====="
          ls -lh partitions/

      # ── Patchowanie wszystkich partycji dynamicznych ──────────────────────
      - name: Patch ALL dynamic partitions
        run: |
          echo "===== STARTING AUTOMATIC LOOP PATCHING ====="
          PATCH_FAILED_PARTS=""
          OP_LIST=$(find ota_extracted -name "dynamic_partitions_op_list" | head -1)

          if [ -n "$OP_LIST" ]; then
            echo "=== dynamic_partitions_op_list (resize entries) ==="
            grep -E "^resize " "$OP_LIST" || echo "(brak wpisów resize)"
          else
            echo "⚠️  Brak dynamic_partitions_op_list w OTA — resize zostanie pominięty."
          fi

          while IFS= read -r list; do
            part_name=$(basename "$list" .transfer.list)
            echo "Processing partition: $part_name"

            BASE_IMG=""
            if [ -f "partitions/${part_name}.img" ]; then
              BASE_IMG="partitions/${part_name}.img"
            elif [ -f "extra_partitions/${part_name}.img" ]; then
              BASE_IMG="extra_partitions/${part_name}.img"
            fi

            if [ -n "$BASE_IMG" ]; then
              RESIZE_MODE="none"
              TARGET_SIZE=""
              if [ -n "$OP_LIST" ]; then
                TARGET_SIZE=$(grep -E "^resize ${part_name}(_a)? " "$OP_LIST" | awk '{print $3}' | tail -1)
                if [ -n "$TARGET_SIZE" ]; then
                  CURRENT_SIZE=$(stat -c%s "$BASE_IMG")
                  if [ "$TARGET_SIZE" -gt "$CURRENT_SIZE" ]; then
                    truncate -s "$TARGET_SIZE" "$BASE_IMG"
                    RESIZE_MODE="grow"
                  elif [ "$TARGET_SIZE" -lt "$CURRENT_SIZE" ]; then
                    RESIZE_MODE="shrink"
                  fi
                fi
              fi

              cp "$BASE_IMG" "${BASE_IMG}.bak"
              PATCH_LOG=$(mktemp)

              ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
                "$BASE_IMG" \
                "$list" \
                "ota_extracted/${part_name}.new.dat" \
                "ota_extracted/${part_name}.patch.dat" 2>&1 | tee "$PATCH_LOG"
              PROC_EXIT=${PIPESTATUS[0]}

              INTERNAL_CODE=$(grep -oE "error code[[:space:]]*:[[:space:]]*-?[0-9]+" "$PATCH_LOG" | tail -1 | grep -oE "\-?[0-9]+$")
              if [ -n "$INTERNAL_CODE" ] && [ "$INTERNAL_CODE" -ne 0 ]; then
                PATCH_EXIT=$INTERNAL_CODE
              else
                PATCH_EXIT=$PROC_EXIT
              fi
              rm -f "$PATCH_LOG"

              if [ "$PATCH_EXIT" -ne 0 ]; then
                echo "⚠️  WARNING: Patching $part_name failed (kod $PATCH_EXIT) — restoring base."
                mv "${BASE_IMG}.bak" "$BASE_IMG"
                PATCH_FAILED_PARTS="$PATCH_FAILED_PARTS $part_name"
              else
                echo "✓  $part_name patched successfully."
                rm -f "${BASE_IMG}.bak"
                if [ "$RESIZE_MODE" = "shrink" ] && [ -n "$TARGET_SIZE" ]; then
                  truncate -s "$TARGET_SIZE" "$BASE_IMG"
                fi
              fi
            fi
          done < <(find ota_extracted -name "*.transfer.list")

      # ── Rekonstrukcja SUPER ──────────────────────────────────────────────
      - name: Przebudowa dynamicznego obrazu SUPER
        run: |
          mkdir -p final_partitions
          mkdir -p super_input
          cp partitions/*.img super_input/ 2>/dev/null || true

          echo "=== Dynamiczne generowanie argumentów lpmake ==="
          python3 << 'EOF'
          import os
          import math
          import subprocess
          import sys
          import glob

          op_list_files = glob.glob("ota_extracted/**/dynamic_partitions_op_list", recursive=True)
          op_list = op_list_files[0] if op_list_files else ""
          if op_list:
              print(f"Znaleziono op_list: {op_list}")
          else:
              print("⚠️  Brak dynamic_partitions_op_list w OTA — używam wartości domyślnych!")

          parts_dir = "super_input"
          output_img = "final_partitions/super.img"

          REAL_SIZE_FILE = "base_extracted/super_real_size.txt"
          if os.path.exists(REAL_SIZE_FILE):
              with open(REAL_SIZE_FILE) as f:
                  REAL_SUPER_SIZE = int(f.read().strip())
              SUPER_SIZE = REAL_SUPER_SIZE
              GROUP_SIZE = REAL_SUPER_SIZE - 1048576
              print(f"Użyto wykrytego rozmiaru super.img: SUPER_SIZE={SUPER_SIZE}, GROUP_SIZE={GROUP_SIZE}")
          else:
              print("⚠️  Brak super_real_size.txt — używam wartości domyślnych!")
              SUPER_SIZE = 9126809600
              GROUP_SIZE = 9122611200

          def align_to_block(size):
              return int(math.ceil(size / 4096.0) * 4096)

          resize_targets = {}
          if op_list and os.path.exists(op_list):
              with open(op_list, "r") as f:
                  for line in f:
                      line = line.strip()
                      if line.startswith("resize ") and len(line.split()) >= 3:
                          resize_targets[line.split()[1]] = int(line.split()[2])

          cmd = (f"lpmake --metadata-size 65536 --super-name super --metadata-slots 2 "
                 f"--device super:{SUPER_SIZE} --group qti_dynamic_partitions:{GROUP_SIZE}")

          valid_partitions = []
          total_real_size = 0

          for file in sorted(os.listdir(parts_dir)):
              if not file.endswith(".img") or file.endswith(".sparse.img"):
                  continue

              part_name = file[:-4]
              raw_img_path = os.path.join(parts_dir, file)
              sparse_img_path = os.path.join(parts_dir, f"{part_name}.sparse.img")
              raw_size_before = os.path.getsize(raw_img_path)

              try:
                  result = subprocess.run(["file", raw_img_path], capture_output=True, text=True)
                  if "Android sparse image" in result.stdout:
                      subprocess.run(["cp", raw_img_path, sparse_img_path], check=True)
                  else:
                      subprocess.run(["img2simg", raw_img_path, sparse_img_path], check=True)
              except Exception as e:
                  print(f"img2simg failed for {part_name} ({e}), copying raw as fallback")
                  subprocess.run(["cp", raw_img_path, sparse_img_path])

              part_size = align_to_block(raw_size_before)
              valid_partitions.append((part_name, sparse_img_path, part_size))
              total_real_size += part_size

          if total_real_size > GROUP_SIZE:
              print(f"ERROR: Patched partitions ({total_real_size} bytes) exceed GROUP_SIZE ({GROUP_SIZE} bytes).")
              sys.exit(1)

          for p_name, p_path, p_size in valid_partitions:
              cmd += f" --partition {p_name}:none:{p_size}:qti_dynamic_partitions"
              cmd += f" --image {p_name}={p_path}"

          cmd += f" --sparse --output {output_img}"

          with open("lpmake_cmd.sh", "w") as out:
              out.write(cmd + "\n")
          EOF

          echo "=== Wygenerowana komenda lpmake ==="
          cat lpmake_cmd.sh

          echo "=== Uruchamianie rekonstrukcji super.img ==="
          bash lpmake_cmd.sh 2>&1

          if [ -f "final_partitions/super.img" ]; then
            echo "✓ super.img został pomyślnie odbudowany!"
            ls -lh final_partitions/super.img
          else
            echo "BŁĄD: lpmake nie utworzył pliku super.img!"
            exit 1
          fi

      # ── Kopiowanie obrazów statycznych spoza super ───────────────────────
      - name: Skopiuj obrazy statyczne spoza super
        run: |
          for img in boot.img dtbo.img vbmeta.img vbmeta_system.img init_boot.img vendor_boot.img vm-bootsys.img prism.img optics.img; do
            OTA_IMG=$(find ota_extracted -name "$img" | head -1)
            EXTRA_IMG=$(find extra_partitions -name "$img" | head -1)
            BASE_IMG=$(find base_extracted -name "$img" | head -1)

            if [ -n "$OTA_IMG" ]; then
              cp "$OTA_IMG" "final_partitions/$img"
              echo "✓ $img (zastąpiono nowym z OTA)"
            elif [ -n "$EXTRA_IMG" ]; then
              cp "$EXTRA_IMG" "final_partitions/$img"
              echo "✓ $img (skopiowano z folderu extra/CSC)"
            elif [ -n "$BASE_IMG" ]; then
              cp "$BASE_IMG" "final_partitions/$img"
              echo "  $img (zachowano oryginalny z bazy)"
            fi
          done

      # ── Pakowanie AP i CSC osobno ────────────────────────────────────────
      - name: Spakuj AP i CSC tar.md5
        run: |
          mkdir ap_final
          for img in boot dtbo vbmeta vbmeta_system init_boot vendor_boot vm-bootsys super; do
            IMG_PATH=$(find final_partitions -name "${img}.img" | head -1)
            if [ -n "$IMG_PATH" ]; then
              cp "$IMG_PATH" ap_final/
            fi
          done
          REC_PATH=$(find final_partitions -name "recovery.img" | head -1)
          if [ -n "$REC_PATH" ]; then
            cp "$REC_PATH" ap_final/
          fi

          if [ -n "$(ls ap_final/*.img 2>/dev/null)" ]; then
            cd ap_final
            tar -cf "../final_output/AP_patched.tar" *.img
            cd ..
          fi
          rm -rf ap_final

          mkdir csc_final
          for img in prism optics; do
            IMG_PATH=$(find final_partitions -name "${img}.img" | head -1)
            if [ -n "$IMG_PATH" ]; then
              cp "$IMG_PATH" csc_final/
            fi
          done
          find csc_extracted -name "*.img" ! -name "prism.img" ! -name "optics.img" -exec cp {} csc_final/ \;

          if [ -n "$(ls csc_final/*.img 2>/dev/null)" ]; then
            cd csc_final
            tar -cf "../final_output/CSC_patched.tar" *.img
            cd ..
          fi
          rm -rf csc_final

          cd final_output
          for f in *.tar; do
            if [ -f "$f" ]; then
              md5sum -b "$f" >> "${f}.md5"
              mv "$f" "${f}.md5"
            fi
          done
          cd ..

          rm -rf final_partitions base_extracted ota ota_extracted csc_extracted extra_partitions partitions super_input

          echo "=== Zawartość final_output ==="
          ls -lh final_output/

      # ── Upload wszystkich plików do Artifacts ────────────────────────────
      - name: Upload wszystkich plików do Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Patched_Firmware
          path: final_output/*.tar.md5
          retention-days: 7

      # ── Upload na GoFile (wszystkie pliki) ──────────────────────────────
      - name: Upload na GoFile
        env:
          GOFILE_TOKEN: ${{ secrets.GOFILE_TOKEN }}
        run: |
          for FILE in final_output/*.tar.md5; do
            [ -e "$FILE" ] || continue
            echo "Upload: $FILE"
            SERVER=$(curl -s https://api.gofile.io/servers | jq -r '.data.servers[] | select(.status == "ok") | .name' | head -1)
            if [ -z "$SERVER" ] || [ "$SERVER" = "null" ]; then
              echo "ERROR: Nie udało się pobrać działającego serwera GoFile"
              exit 1
            fi
            echo "Wybrany serwer: $SERVER"
            RESPONSE=$(curl -s -F "file=@${FILE}" -F "token=${GOFILE_TOKEN}" "https://${SERVER}.gofile.io/uploadFile")
            echo "$RESPONSE" | jq .
            STATUS=$(echo "$RESPONSE" | jq -r '.status')
            if [ "$STATUS" != "ok" ]; then
              echo "ERROR: Upload nie powiódł się dla $FILE"
              exit 1
            fi
            DOWNLOAD_PAGE=$(echo "$RESPONSE" | jq -r '.data.downloadPage')
            DIRECT_LINK=$(echo "$RESPONSE" | jq -r '.data.directLink')
            echo "======================================="
            echo "UPLOAD ZAKOŃCZONY: $FILE"
            echo "DOWNLOAD PAGE: $DOWNLOAD_PAGE"
            echo "DIRECT LINK: $DIRECT_LINK"
            echo "======================================="
          done
