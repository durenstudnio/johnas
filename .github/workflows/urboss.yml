name: urboss

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Zwolnienie miejsca ──────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true

      # ── Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip lz4 wget file android-sdk-libsparse-utils python3 jq
          wget -nv https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig

          wget -nv -O lpunpack https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack
          wget -nv -O lpmake https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpmake
          chmod +x lpunpack lpmake
          sudo cp lpunpack lpmake /usr/local/bin/

          wget -nv https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      # ── Pobranie artefaktów ────────────────────────────────────────────
      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L -H "Authorization: Bearer $GH_PAT" -o ap.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7736838535/zip"
          unzip -q ap.zip -d base_fw

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L -H "Authorization: Bearer $GH_PAT" -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota

      # ── Ekstrakcja OTA ──────────────────────────────────────────────────
      - name: Extract OTA
        run: |
          mkdir ota_extracted
          OTAFILE=$(find ota -type f | head -1)
          unzip -q "$OTAFILE" -d ota_extracted

      # ── Ekstrakcja AP ───────────────────────────────────────────────────
      - name: Extract AP (tar.md5)
        run: |
          mkdir -p base_extracted

          for i in 1 2 3; do
            TARFILE=$(find base_fw -name "*.tar.md5" -o -name "*.tar" | head -1)
            [ -n "$TARFILE" ] && break
            ZIP=$(find base_fw -name "*.zip" | head -1)
            [ -z "$ZIP" ] && break
            unzip -q -o "$ZIP" -d base_fw && rm -f "$ZIP"
          done

          TARFILE=$(find base_fw -name "*.tar.md5" | head -1)
          if [ -n "$TARFILE" ]; then
            head -c -33 "$TARFILE" | tar -x -C base_extracted/
          else
            TARFILE=$(find base_fw -name "*.tar" | head -1)
            [ -n "$TARFILE" ] && tar -x -f "$TARFILE" -C base_extracted/
          fi

      # ── Decompress lz4 ────────────────────────────────────────────────
      - name: Decompress lz4
        run: |
          cd base_extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            lz4 -d "$f" "${f%.lz4}"
            rm -f "$f"
          done

      # ── Unpack super.img ──────────────────────────────────────────────
      - name: Unpack super.img
        run: |
          mkdir -p partitions
          SUPER=$(find base_extracted -name "super.img" | head -1)

          if [ -z "$SUPER" ]; then
            echo "BŁĄD: Nie znaleziono super.img"
            exit 1
          fi

          if ! lpunpack "$SUPER" partitions/; then
            echo "fallback lpunpack"
            simg2img "$SUPER" base_extracted/super_raw.img
            lpunpack base_extracted/super_raw.img partitions/
          fi

      # ── Patch (tylko system i product) ─────────────────────────────────
      - name: Patch system and product
        run: |
          TARGETS="system product"
          OP_LIST="ota_extracted/dynamic_partitions_op_list"

          for part in $TARGETS; do
            BASE="partitions/${part}.img"
            [ -f "$BASE" ] || continue

            if [ -f "$OP_LIST" ]; then
              TARGET_SIZE=$(grep -E "^resize ${part}(_a)? " "$OP_LIST" | awk '{print $3}' | tail -1)
              CURRENT_SIZE=$(stat -c%s "$BASE")

              if [ -n "$TARGET_SIZE" ] && [ "$TARGET_SIZE" -gt "$CURRENT_SIZE" ]; then
                truncate -s "$TARGET_SIZE" "$BASE"
              fi
            fi

            cp "$BASE" "${BASE}.bak"

            ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
              "$BASE" \
              "ota_extracted/${part}.transfer.list" \
              "ota_extracted/${part}.new.dat" \
              "ota_extracted/${part}.patch.dat" || mv "${BASE}.bak" "$BASE"

            rm -f "${BASE}.bak"
          done

      # ── Fix nesting: przenieś /system/system/* do /system/ ─────────────
      - name: Fix nesting (move /system/system to /system)
        run: |
          sudo apt-get update
          sudo apt-get install -y f2fs-tools linux-modules-extra-$(uname -r) || true
          sudo modprobe f2fs 2>/dev/null || true

          mkdir -p mnt_system mnt_new

          # Zamontuj obecny system.img
          sudo mount -o loop partitions/system.img mnt_system

          # Sprawdź, czy istnieje podkatalog system/
          if [ -d "mnt_system/system" ]; then
            echo "Znaleziono zagnieżdżony katalog system/, przenoszę zawartość do głównego system/"
            # Utwórz katalog tymczasowy
            mkdir -p /tmp/system_root
            # Kopiujemy wszystko z mnt_system/system do tymczasowego miejsca
            sudo cp -a mnt_system/system/* /tmp/system_root/
            # Czyścimy stary system (oprócz samego system/)
            sudo rm -rf mnt_system/*
            # Przywracamy zawartość
            sudo cp -a /tmp/system_root/* mnt_system/
            # Usuwamy tymczasowy katalog
            sudo rm -rf /tmp/system_root
          else
            echo "Brak zagnieżdżenia, nic nie robię."
          fi

          sudo umount mnt_system

          # Teraz przekonwertuj system na f2fs + powiększ (zachowujemy fix)
          OLD_SIZE=$(stat -c%s partitions/system.img)
          NEW_SIZE=$((OLD_SIZE + 200*1024*1024))

          dd if=/dev/zero of=partitions/system_new.img bs=1M count=$((NEW_SIZE / 1024 / 1024 + 2))
          mkfs.f2fs -f partitions/system_new.img

          sudo mount -o loop partitions/system_new.img mnt_new
          sudo mount -o loop partitions/system.img mnt_system

          sudo cp -a mnt_system/* mnt_new/

          sudo umount mnt_new
          sudo umount mnt_system

          mv partitions/system_new.img partitions/system.img
          rm -rf mnt_system mnt_new

      # ── Prepare artifacts (tylko system i product) ────────────────────
      - name: Prepare artifacts
        run: |
          mkdir -p final_imgs
          cp partitions/system.img final_imgs/
          cp partitions/product.img final_imgs/ 2>/dev/null || true

          ls -lh final_imgs/

      # ── Upload ─────────────────────────────────────────────────────────
      - name: Upload images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched_system_images
          path: final_imgs/*.img
          retention-days: 7
