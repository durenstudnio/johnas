name: urboss

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Zwolnienie miejsca ──────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true

      # ── Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip lz4 wget file android-sdk-libsparse-utils python3 jq
          wget -nv https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig

          wget -nv -O lpunpack https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack
          wget -nv -O lpmake https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpmake
          chmod +x lpunpack lpmake
          sudo cp lpunpack lpmake /usr/local/bin/

          wget -nv https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      # ── Pobranie artefaktów ────────────────────────────────────────────
      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" -o ap.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7736838535/zip"
          unzip -q ap.zip -d base_fw

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L -H "Authorization: Bearer $GH_PAT" -H "Accept: application/vnd.github+json" -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota

      # ── Ekstrakcja OTA ──────────────────────────────────────────────────
      - name: Extract OTA
        run: |
          mkdir ota_extracted
          OTAFILE=$(find ota -type f | head -1)
          unzip -q "$OTAFILE" -d ota_extracted

      # ── Ekstrakcja AP (super.img) ──────────────────────────────────────
      - name: Extract AP (tar.md5)
        run: |
          mkdir -p base_extracted
          # rozpakuj zagnieżdżone zipy (max 3)
          for i in 1 2 3; do
            TARFILE=$(find base_fw -name "*.tar.md5" -o -name "*.tar" | head -1)
            [ -n "$TARFILE" ] && break
            ZIP=$(find base_fw -name "*.zip" | head -1)
            [ -z "$ZIP" ] && break
            unzip -q -o "$ZIP" -d base_fw && rm -f "$ZIP"
          done

          TARFILE=$(find base_fw -name "*.tar.md5" | head -1)
          if [ -n "$TARFILE" ]; then
            head -c -33 "$TARFILE" | tar -x -C base_extracted/
          else
            TARFILE=$(find base_fw -name "*.tar" | head -1)
            [ -n "$TARFILE" ] && tar -x -f "$TARFILE" -C base_extracted/
          fi

          if [ -z "$TARFILE" ]; then
            echo "BŁĄD: Brak pliku .tar/.tar.md5 w artefakcie AP"
            exit 1
          fi

      # ── Dekompresja lz4 ─────────────────────────────────────────────────
      - name: Decompress lz4
        run: |
          cd base_extracted
          for f in *.lz4; do
            [ -f "$f" ] || continue
            lz4 -d "$f" "${f%.lz4}"
            rm "$f"
          done

      # ── Rozpakowanie super.img ──────────────────────────────────────────
      - name: Unpack super.img
        run: |
          mkdir -p partitions
          SUPER=$(find base_extracted -name "super.img" | head -1)
          if [ -z "$SUPER" ]; then
            echo "BŁĄD: Nie znaleziono super.img"
            exit 1
          fi

          if ! lpunpack "$SUPER" partitions/; then
            echo "lpunpack nie obsługuje sparse, konwersja do raw..."
            simg2img "$SUPER" base_extracted/super_raw.img
            lpunpack base_extracted/super_raw.img partitions/
            rm -f base_extracted/super_raw.img
          fi

      # ── Patchowanie tylko system, system_ext, product ──────────────────
      - name: Patch system, system_ext, product
        run: |
          TARGETS="system system_ext product"
          OP_LIST="ota_extracted/dynamic_partitions_op_list"

          for part in $TARGETS; do
            BASE="partitions/${part}.img"
            [ -f "$BASE" ] || { echo "⚠️  Brak $BASE – pomijam"; continue; }

            # 1) resize jeśli występuje w op_list
            if [ -f "$OP_LIST" ]; then
              TARGET_SIZE=$(grep -E "^resize ${part}(_a)? " "$OP_LIST" | awk '{print $3}' | tail -1)
              if [ -n "$TARGET_SIZE" ]; then
                CURRENT_SIZE=$(stat -c%s "$BASE")
                if [ "$TARGET_SIZE" -gt "$CURRENT_SIZE" ]; then
                  echo "GROW $part: $CURRENT_SIZE -> $TARGET_SIZE (przed patchem)"
                  truncate -s "$TARGET_SIZE" "$BASE"
                elif [ "$TARGET_SIZE" -lt "$CURRENT_SIZE" ]; then
                  echo "SHRINK $part: $CURRENT_SIZE -> $TARGET_SIZE (po patchu)"
                fi
              fi
            fi

            # 2) wykonaj patch
            cp "$BASE" "${BASE}.bak"
            ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
              "$BASE" \
              "ota_extracted/${part}.transfer.list" \
              "ota_extracted/${part}.new.dat" \
              "ota_extracted/${part}.patch.dat" || {
                echo "⚠️  Patch dla $part nie powiódł się – przywracam obraz bazowy"
                mv "${BASE}.bak" "$BASE"
              }
            rm -f "${BASE}.bak"

            # 3) shrink po patchu (jeśli był zaplanowany)
            if [ -f "$OP_LIST" ] && [ -n "$TARGET_SIZE" ] && [ "$TARGET_SIZE" -lt "$CURRENT_SIZE" ]; then
              echo "Wykonuję shrink dla $part"
              truncate -s "$TARGET_SIZE" "$BASE"
            fi
          done

      # ── Kopiowanie gotowych obrazów do artefaktów ──────────────────────
      - name: Merge system_ext into system and fix nesting
  run: |
    sudo apt-get update
    sudo apt-get install -y e2fsprogs e2tools

    mkdir -p mnt_system mnt_system_ext mnt_new

    sudo mount -o loop partitions/system.img mnt_system
    sudo mount -o loop partitions/system_ext.img mnt_system_ext

    OLD_SIZE=$(stat -c%s partitions/system.img)
    NEW_SIZE=$((OLD_SIZE + 200*1024*1024))

    echo "Tworzę nowy obraz o rozmiarze $NEW_SIZE bajtów..."
    dd if=/dev/zero of=partitions/system_merged.img bs=1M count=$((NEW_SIZE / 1024 / 1024 + 2)) status=progress
    mkfs.ext4 -F partitions/system_merged.img

    sudo mount -o loop partitions/system_merged.img mnt_new

    # Spłaszcz /system (usuń zagnieżdżenie system/system)
    if [ -d "mnt_system/system" ] && [ $(ls -1 mnt_system | wc -l) -eq 1 ]; then
      echo "🔧 Wykryto zagnieżdżenie – podnoszę zawartość"
      sudo cp -a mnt_system/system/* mnt_new/
    else
      echo "✅ Struktura płaska"
      sudo cp -a mnt_system/* mnt_new/
    fi

    # Wklej system_ext do /system_ext
    echo "📦 Scalanie system_ext do /system_ext"
    if [ -d "mnt_system_ext/system_ext" ] && [ $(ls -1 mnt_system_ext | wc -l) -eq 1 ]; then
      sudo mkdir -p mnt_new/system_ext
      sudo cp -a mnt_system_ext/system_ext/* mnt_new/system_ext/
    else
      sudo mkdir -p mnt_new/system_ext
      sudo cp -a mnt_system_ext/* mnt_new/system_ext/
    fi

    sudo umount mnt_system mnt_system_ext mnt_new

    mv partitions/system_merged.img partitions/system.img
    rm -f partitions/system_ext.img

    echo "✅ Gotowe! system_ext scalony, zagnieżdżenie naprawione."

- name: Prepare artifacts
  run: |
    mkdir -p final_imgs
    cp partitions/system.img final_imgs/
    # system_ext już nie istnieje – jest w system.img
    cp partitions/product.img final_imgs/ 2>/dev/null || true
    echo "Gotowe obrazy:"
    ls -lh final_imgs/
      - name: Upload images as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: patched_system_images
          path: final_imgs/*.img
          retention-days: 7
