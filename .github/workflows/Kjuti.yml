name: Test product Patch from Super

on:
  workflow_dispatch:

jobs:
  patch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          echo "Before:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          docker rmi $(docker images -q) 2>/dev/null || true
          echo "After:"
          df -h /

      - name: Download AP artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p base_fw
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ap.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7736838535/zip"
          unzip -q ap.zip -d base_fw

      - name: Download OTA artifact
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          mkdir -p ota
          curl -L \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -o ota.zip \
            "https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7709183127/zip"
          unzip -q ota.zip -d ota

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip lz4 wget file android-sdk-libsparse-utils python3 brotli
          wget -nv https://github.com/danjekb/tools/raw/refs/heads/main/libssl1.0.0_1.0.2g-1ubuntu4.20_amd64.deb
          sudo dpkg -i libssl1.0.0_*.deb || true
          sudo ldconfig
          wget -nv -O lpunpack https://raw.githubusercontent.com/whyshhnuv/lpunpack-lpmake-mirror/Linux-debian/binary/lpunpack
          chmod +x lpunpack
          sudo cp lpunpack /usr/local/bin/

      - name: Download IMG Patch Tools
        run: |
          wget -nv https://github.com/erfanoabdi/imgpatchtools/releases/download/0.3/IMG_Patch_Tools_0.3.zip
          unzip -q IMG_Patch_Tools_0.3.zip
          chmod +x IMG_Patch_Tools_0.3/Linux_x64/*

      - name: Extract OTA
        run: |
          mkdir -p ota_extracted
          OTAFILE=$(find ota -type f | head -1)
          unzip -q "$OTAFILE" -d ota_extracted
          for f in ota_extracted/*.new.dat.br; do
            [ -f "$f" ] && brotli -d "$f"
          done

      - name: Extract AP and Unpack product
        run: |
          mkdir -p base_extracted
          APFILE=$(find base_fw -name "*.tar.md5" -o -name "*.tar" | head -1)
          if [[ "$APFILE" == *.tar.md5 ]]; then
            head -c -33 "$APFILE" | tar -xf - -C base_extracted/ super.img.lz4 2>/dev/null || \
            head -c -33 "$APFILE" | tar -xf - -C base_extracted/ super.img 2>/dev/null
          else
            tar -xf "$APFILE" -C base_extracted/ super.img.lz4 2>/dev/null || \
            tar -xf "$APFILE" -C base_extracted/ super.img 2>/dev/null
          fi
          cd base_extracted
          [ -f super.img.lz4 ] && lz4 -d super.img.lz4 super.img && rm super.img.lz4
          if [ -f super.img ] && file super.img | grep -q "Android sparse image"; then
            simg2img super.img super_raw.img && rm super.img && mv super_raw.img super.img
          fi
          if lpunpack --partition=product super.img ./ 2>/dev/null; then
            echo "Wyciągnięto product.img"
          else
            lpunpack super.img ./
            [ -f product.img ] && cp product.img ../product.img.bak && rm -f *.img && mv ../product.img.bak product.img
          fi
          rm -f super.img
          [ ! -f product.img ] && echo "BŁĄD: Brak product.img" && exit 1
          ls -lh product.img

      - name: Patch product image
        run: |
          [ ! -f ota_extracted/product.transfer.list ] && echo "BŁĄD: Brak product.transfer.list" && exit 1
          cp base_extracted/product.img ./
          ./IMG_Patch_Tools_0.3/Linux_x64/BlockImageUpdate \
            product.img \
            ota_extracted/product.transfer.list \
            ota_extracted/product.new.dat \
            ota_extracted/product.patch.dat
          [ $? -ne 0 ] && echo "Patchowanie nie powiodło się" && exit 1
          echo "Patchowanie zakończone sukcesem"

      - name: Verify result
        run: |
          echo "===== FILE =====" && file product.img
          echo "===== SHA1 =====" && sha1sum product.img
          echo "===== SIZE =====" && ls -lh product.img

      - name: Upload patched image
        uses: actions/upload-artifact@v4
        with:
          name: product-patched
          path: product.img
          retention-days: 7
