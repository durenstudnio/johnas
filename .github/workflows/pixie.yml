name: Compress and Upload Artifact to Pixeldrain

on:
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      # 1. Pobieranie artefaktu z poprzedniego uruchomienia
      - name: Download Artifact from Specific Run
        run: |
          echo "Pobieranie oryginalnego artefaktu (7.8 GB)..."
          curl -L -# \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/durenstudnio/johnas/actions/artifacts/7747143777/zip \
            -o artifact.zip
          
          echo "Rozpakowywanie pliku ZIP..."
          unzip artifact.zip -d extracted_artifact/
          rm artifact.zip # Usuwamy zip, aby zwolnić cenne miejsce na dysku

      # 2. Maksymalna kompresja rozpakowanego pliku do formatu .xz
      - name: Max Compress File with XZ
        run: |
          cd extracted_artifact/
          ORIGINAL_FILE=$(ls -A1 | head -n 1)
          
          if [ -z "$ORIGINAL_FILE" ]; then
            echo "Błąd: Nie znaleziono pliku do kompresji!"
            exit 1
          fi
          
          echo "Rozpoczynam maksymalną kompresję pliku '$ORIGINAL_FILE' za pomocą XZ..."
          echo "To może zająć od kilku do kilkunastu minut ze względu na rozmiar 10.7 GB. Proszę o cierpliwość..."
          
          # -9e: Poziom kompresji 9 (maksymalny) + e (extreme - dodatkowa optymalizacja)
          # -v: Pokazuje postęp kompresji w logach
          xz -9e -v "$ORIGINAL_FILE"
          
          echo "Kompresja zakończona!"
          echo "Nowy plik w katalogu:"
          ls -lh

      # 3. Wysyłanie mocno skompresowanego pliku na Pixeldrain
      - name: Upload Compressed File to Pixeldrain
        run: |
          cd extracted_artifact/
          COMPRESSED_FILE=$(ls -A1 | head -n 1)
          
          echo "Wysyłanie skompresowanego pliku '$COMPRESSED_FILE' do Pixeldrain..."
          
          RESPONSE=$(curl -u ":${{ secrets.PIXELDRAIN_API_KEY }}" \
            -# --fail \
            -F "file=@$COMPRESSED_FILE" \
            https://pixeldrain.com/api/file)
          
          echo "Odpowiedź od Pixeldrain:"
          echo "$RESPONSE"
          
          FILE_ID=$(echo $RESPONSE | jq -r '.id')
          
          echo "=========================================="
          echo "Plik został pomyślnie skompresowany i wysłany!"
          echo "Link do pobrania: https://pixeldrain.com/u/$FILE_ID"
          echo "=========================================="
